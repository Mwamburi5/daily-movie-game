<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- W5e: no zoom lock — pinch-zoom must stay available (WCAG 1.4.4); the
         board's smallest labels need it. iOS ignored the lock anyway; Android
         Chrome enforced it, which walled off low-vision players. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f4efe6" />
    <!-- Quiet phase (WS1): keep the alias out of search indexes until launch. -->
    <meta name="robots" content="noindex, nofollow" />
    <title>Match Cut</title>
    <!-- Stub type stack: preloads land with the W1 port (the @font-face rules
         in index.css were inert until the wired components referenced them). -->
    <link rel="preload" href="/fonts/domine-700-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-400-800-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono-600-700-latin.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Vercel Web Analytics via the script-tag route (deps are locked — no
         @vercel/analytics). The stub queues events in window.vaq until the
         deferred script loads; it silently never loads off-Vercel. Custom
         events fire through src/lib/analytics.ts. -->
    <script>
      window.va =
        window.va ||
        function () {
          ;(window.vaq = window.vaq || []).push(arguments)
        }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
